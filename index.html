<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canadian Pilot Logbook • Transport Canada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; font-size: 13px; }
        .header-font { font-family: 'Space Grotesk', sans-serif; }
        
        .logbook-table th {
            background: #0a2540;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.55rem;
            padding: 8px 4px;
            white-space: nowrap;
        }
        .logbook-table td {
            padding: 9px 4px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.82rem;
            text-align: center;
        }
        .table-wrapper { overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

<div class="max-w-screen-2xl mx-auto">

    <!-- 1. Header -->
    <div class="bg-[#0a2540] text-white px-6 py-5 flex justify-between items-center">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-white rounded-2xl flex items-center justify-center text-3xl">✈️</div>
            <div>
                <h1 class="header-font text-2xl tracking-tighter">CANADIAN PILOT LOGBOOK</h1>
                <p class="text-sky-300 text-xs tracking-widest">TRANSPORT CANADA • CARs COMPLIANT</p>
            </div>
        </div>
        <button onclick="exportToPDF()" class="bg-white text-[#0a2540] px-6 py-3 rounded-3xl font-semibold hover:bg-amber-400">📄 EXPORT PDF (A3)</button>
    </div>

    <!-- 2. Toolbar -->
    <div class="bg-white border-b px-6 py-5 sticky top-0 z-20">
        <div class="flex items-center justify-between">
            <button onclick="showAddModal()" class="flex items-center gap-x-3 bg-[#0a2540] hover:bg-sky-700 text-white px-8 py-4 rounded-3xl font-semibold transition-colors">
                <span class="text-3xl leading-none">+</span> ADD NEW FLIGHT
            </button>
            <div class="flex items-center gap-x-8 text-sm text-slate-600">
                <span id="entry-count" class="font-medium">0 entries</span>
                <span id="sync-status" class="flex items-center gap-x-1.5">
                    <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></span> Synced
                </span>
            </div>
        </div>
    </div>

    <!-- 3. Totals Layer - Clean and clearly visible -->
    <div class="px-6 py-6 bg-white border-b">
        <div class="bg-slate-50 border border-[#0a2540]/30 rounded-3xl p-6">
            <div class="grid grid-cols-12 gap-8">
                <div class="col-span-12 md:col-span-5">
                    <div class="text-[#0a2540] font-semibold mb-3">COLUMN TOTALS SUMMARY</div>
                    <div id="totals-grid" class="grid grid-cols-2 md:grid-cols-3 gap-y-3 text-sm"></div>
                </div>
                <div class="col-span-12 md:col-span-7 border-l border-slate-200 pl-8">
                    <div class="flex justify-between items-baseline">
                        <div>
                            <div class="text-[#0a2540] font-semibold">GRAND TOTAL HOURS</div>
                            <div class="text-xs text-slate-500">(Single + Multi Engine only)</div>
                        </div>
                        <div id="grand-total-time" class="text-6xl font-bold text-[#0a2540] tabular-nums">0.0</div>
                    </div>
                    <div id="sub-totals" class="mt-6 flex flex-wrap gap-x-8 gap-y-1 text-sm text-slate-600"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. Table -->
    <div class="px-6 pb-8">
        <div id="logbook-content" class="bg-white rounded-3xl shadow-xl overflow-hidden">
            <div class="table-wrapper overflow-x-auto">
                <table id="logbook-table" class="logbook-table w-full">
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>AIRCRAFT TYPE</th>
                            <th>REG</th>
                            <th>FROM</th>
                            <th>TO</th>
                            <th colspan="5">SINGLE-ENGINE</th>
                            <th colspan="5">MULTI-ENGINE</th>
                            <th colspan="4">X-COUNTRY</th>
                            <th colspan="4">INSTRUMENT</th>
                            <th>NIGHT LNDG</th>
                            <th>APPS</th>
                            <th class="text-left">PIC / CO-PILOT / REMARKS</th>
                            <th class="no-print w-20">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="logbook-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Simple modal for testing -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl p-8 w-full max-w-md">
        <h2 class="text-2xl mb-6">Add New Flight</h2>
        <button onclick="hideModal()" class="w-full py-4 bg-slate-200 rounded-2xl">Close (test)</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDXNNLgbrkYWbn32D34IBl18J7F1wcyJHQ",
      authDomain: "canadian-pilot-logbook.firebaseapp.com",
      projectId: "canadian-pilot-logbook",
      storageBucket: "canadian-pilot-logbook.firebasestorage.app",
      messagingSenderId: "74288469835",
      appId: "1:74288469835:web:c8c3dbe90e65a69a9bbace"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let flights = [];

    async function loadFromFirebase() {
        try {
            const snapshot = await db.collection("flights").get();
            flights = [];
            snapshot.forEach(doc => flights.push({ id: doc.id, ...doc.data() }));
            updateAllTotals();
            document.getElementById('sync-status').innerHTML = `<span class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></span> Synced`;
        } catch (e) {
            console.error(e);
        }
    }

    function updateAllTotals() {
        renderTable();
        buildTotals();
    }

    function renderTable() {
        const tbody = document.getElementById('logbook-body');
        tbody.innerHTML = '';
        flights.forEach(f => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${f.date || ''}</td>
                <td class="text-left">${f.aircraftType || ''}</td>
                <td>${f.registration || ''}</td>
                <td>${f.from || ''}</td>
                <td>${f.to || ''}</td>
                <td colspan="20" class="text-xs text-slate-500">Flight data (SE/ME/XC etc.)</td>
            `;
            tbody.appendChild(tr);
        });
        document.getElementById('entry-count').textContent = `${flights.length} entries`;
    }

    function buildTotals() {
        let grand = 0;
        let se = 0, me = 0;

        flights.forEach(f => {
            const seHours = (parseFloat(f.seDayPic||0) + parseFloat(f.seDayDual||0) + parseFloat(f.seNightPic||0) + parseFloat(f.seNightDual||0));
            const meHours = (parseFloat(f.meDayPic||0) + parseFloat(f.meDayDual||0) + parseFloat(f.meNightPic||0) + parseFloat(f.meNightDual||0));
            se += seHours;
            me += meHours;
            grand += seHours + meHours;
        });

        document.getElementById('grand-total-time').textContent = grand.toFixed(1);

        document.getElementById('totals-grid').innerHTML = `
            <div>Single-Engine: <span class="font-semibold">${se.toFixed(1)}</span></div>
            <div>Multi-Engine: <span class="font-semibold">${me.toFixed(1)}</span></div>
        `;

        document.getElementById('sub-totals').innerHTML = `
            <div>SE: <span class="font-semibold">${se.toFixed(1)}</span></div>
            <div>ME: <span class="font-semibold">${me.toFixed(1)}</span></div>
        `;
    }

    function showAddModal() {
        document.getElementById('modal').classList.remove('hidden');
    }

    function hideModal() {
        document.getElementById('modal').classList.add('hidden');
    }

    function exportToPDF() {
        const element = document.getElementById('logbook-content');
        html2pdf().set({ filename: `Logbook_${new Date().toISOString().slice(0,10)}.pdf` }).from(element).save();
    }

    window.onload = () => {
        loadFromFirebase();
        console.log('%c✅ Clean totals layer restored', 'color:#0a2540; font-weight:600');
    };
</script>
</body>
</html>
